<script type="text/javascript">
    // ==========================================
    // VIEW: FORMS, BUILDER & SHUTTLE
    // ==========================================
    window.C9.Forms = {

      renderDetails: function(eventId) {
        C9.Store.update({ activeLedgerEntryId: eventId });
        const targetEvent = C9.Store.state.memoryStore.find(item => item.id === eventId);

        if (targetEvent) {
          // Quarantine the Google ID and the full event payload in the State Store
          C9.Store.update({
            activeLedgerEntryGoogleCalendarId: targetEvent.googleCalendarId,
            activeLedgerEntryPayload: targetEvent
          });

          // Grab classic elements
          const thingInput = document.getElementById('calendarEventTitleInput');

          // Grab the new Thing Entity fields
          const symbolInput = document.getElementById('timelineDetailsSymbol');
          const idtInput = document.getElementById('timelineDetailsIdt');
          const durationInput = document.getElementById('timelineDetailsDuration');
          const idInput = document.getElementById('timelineDetailsId');
          const timestampInput = document.getElementById('timelineDetailsTimestamp');
          const dataInput = document.getElementById('timelineDetailsData');

          // Populate the specific C9 entity fields
          if (thingInput) thingInput.textContent = targetEvent.thing || "";
          if (symbolInput) symbolInput.textContent = targetEvent.symbol || "";
          if (idtInput) idtInput.textContent = targetEvent.idt || "";
          if (durationInput) durationInput.textContent = targetEvent.duration || "";
          if (idInput) idInput.textContent = targetEvent.id || "";
          if (timestampInput) timestampInput.textContent = targetEvent.timestamp || "";
          if (dataInput) dataInput.textContent = targetEvent.data || "";
        }
      },

      timelineEntryDetailsPanelClearBuilderLedgerEntryGoogleCalendarId: function() {
        C9.Store.update({ builderLedgerEntryGoogleCalendarId: null });
      },

      timelineEntryDetailsPanelClearBuilderLedgerEntryPayload: function() {
        C9.Store.update({ builderLedgerEntryPayload: null });

        const LedgerEntryUpdateCreatePanelPayloadField = document.getElementById('calendarEntryDescriptionInput');
        LedgerEntryUpdateCreatePanelPayloadField.innerText = C9.Store.state.builderLedgerEntryPayload;
      },

      timelineEntryDetailsPanelClearForm: function() {
        const fields = {
            symbol: document.getElementById('timelineDetailsSymbol'),
            thing: document.getElementById('calendarEventTitleInput'),
            idt: document.getElementById('timelineDetailsIdt'),
            duration: document.getElementById('timelineDetailsDuration'),
            id: document.getElementById('timelineDetailsId'),
            timestamp: document.getElementById('timelineDetailsTimestamp'),
            data: document.getElementById('timelineDetailsData')
        };

        fields.symbol.innerText = '';
        fields.thing.innerText = '';
        fields.idt.innerText = '';
        fields.duration.innerText = '';
        fields.id.innerText = '';
        fields.timestamp.innerText = '';
        fields.data.innerText = '';

        this.timelineEntryDetailsPanelClearBuilderLedgerEntryGoogleCalendarId();
        this.timelineEntryDetailsPanelClearBuilderLedgerEntryPayload();

        C9.Store.state.ThingEntityPayload.reset()
      },

      loadAsReference: function() {
        console.log('loadAsReference and return');
        return

        const srcDesc = document.getElementById('calendarEventDescription');
        const destDesc = document.getElementById('descriptionPayloadInput');
        const btn = document.getElementById('loadEntryAsReference');

        if (!srcDesc || !destDesc || !btn) return;

        const srcText = srcDesc.innerText;
        const idMatch = srcText.match(/id:(.*)/i);
        const extractedId = idMatch ? idMatch[1].trim() : null;

        if (!extractedId || extractedId === "") {
          btn.style.color = "var(--c1d1)";
          setTimeout(() => { btn.style.color = "var(--c1)"; }, 2000);
          return;
        }

        let destText = destDesc.innerText;
        if (destText.includes('[#C9D]')) {
          destText = destText.replace(/\[#C9D\]/i, `[#C9D]\nreferenceId:${extractedId}`);
        } else {
          destText += `\n[#C9D]\nreferenceId:${extractedId}\n[/#C9D]`;
        }

        destDesc.innerText = destText;
        btn.style.color = "var(--c1d1)";
        setTimeout(() => { btn.style.color = "var(--c1)"; }, 2000);
      },

      timelineDetailsPanelParseInPlace: function() {
        // 1. Instantly invalidate any previous state
        C9.Store.state.ThingEntityPayload.reset();

        const statusField = document.getElementById('timelineDetailsPanelStatusField');
        const previewField = document.getElementById('calendarEntryDescriptionInput');
        statusField.innerText = "";
        statusField.style.color = "var(--c1d1)";

        const getVal = (id) => {
            const el = document.getElementById(id);
            return el ? el.innerText.trim() : "";
        };

        const abortWithError = (message) => {
            statusField.innerText = message;
        };

        // 2. Scrape UI
        const symVal = getVal('timelineDetailsSymbol');
        const thingVal = getVal('calendarEventTitleInput');
        const idtVal = getVal('timelineDetailsIdt');
        const durVal = getVal('timelineDetailsDuration');
        const idVal = getVal('timelineDetailsId');
        const tsVal = getVal('timelineDetailsTimestamp');
        const dataVal = getVal('timelineDetailsData');

        // 3. Validate
        if ([...symVal].length !== 1) return abortWithError("Symbol must be one character or emoji");
        if (thingVal === "") return abortWithError("Thing cannot be empty");

        if (idtVal !== "") {
            const parsedDate = new Date(idtVal);
            if (isNaN(parsedDate.getTime())) return abortWithError("Idt must be a valid date format");
        }

        if (durVal !== "") {
            let checkDur = durVal.startsWith('-') ? durVal.substring(1).trim() : durVal;
            const parts = checkDur.split(':');
            if (parts.length !== 3 || parts.some(p => isNaN(parseInt(p, 10)))) {
                return abortWithError("Duration must be H:MM:SS format");
            }
        }

        // 4. Commit to State (Atomic Success)
        const entity = C9.Store.state.ThingEntityPayload;
        entity.symbol = symVal;
        entity.thing = thingVal;
        entity.idt = idtVal;
        entity.duration = durVal;
        entity.id = idVal;
        entity.timestamp = tsVal;
        entity.data = dataVal;
        entity.isValidated = true; // The gate unlocks here

        statusField.innerText = "Successful parse";

        // Optional: Write a draft preview to the UI so you can see it,
        // but the actual submission will serialize directly from state.
        if (previewField) {
            let draft = `[#C9]\nsymbol:${symVal}\nthing:${thingVal}\nidt:${idtVal}\nduration:${durVal}\n`;
            draft += `id:${idVal}\ntimestamp:${tsVal}\n[#C9D]\n`;
            if (dataVal !== "") draft += `${dataVal}\n`;
            draft += `[/#C9D]\n[/#C9]`;
            previewField.innerText = draft;
        }
    },

      submitNewEvent: function() {
        const btn = document.getElementById('createNewEntry');
        const statusField = document.getElementById('calendarEntryStatusField'); // Assuming you want status here now
        const entity = C9.Store.state.ThingEntityPayload;

        // 1. Safety Gate Checks
        if (!entity.isValidated) {
            statusField.innerText = "Parse successfully first";
            return;
        }

        if (entity.id !== "" || entity.timestamp !== "") {
            statusField.innerText = "ID/Timestamp already exists";
            return;
        }

        btn.style.pointerEvents = 'none';
        btn.style.color = "var(--c1d1)";
        statusField.innerText = "Minting keys and creating event...";
        statusField.style.color = "var(--c1d1)";

        // 2. Mint Primary Keys
        const currentMs = Date.now();
        entity.timestamp = currentMs.toString();
        entity.id = `jtp-unk-${entity.timestamp}`;

        // 3. Serialize Final [#C9] Payload
        let serializedPayload = `[#C9]\n`;
        serializedPayload += `symbol:${entity.symbol}\n`;
        serializedPayload += `thing:${entity.thing}\n`;
        serializedPayload += `idt:${entity.idt}\n`;
        serializedPayload += `duration:${entity.duration}\n`;
        serializedPayload += `id:${entity.id}\n`;
        serializedPayload += `timestamp:${entity.timestamp}\n`;
        serializedPayload += `[#C9D]\n`;
        if (entity.data !== "") serializedPayload += `${entity.data}\n`;
        serializedPayload += `[/#C9D]\n`;
        serializedPayload += `[/#C9]`;

        // 4. Calculate Google Calendar Arbitrary Boundaries
        let baseTime = entity.idt !== "" ? new Date(entity.idt) : new Date(currentMs);
        let durationMs = 0;
        let isNegative = false;

        if (entity.duration !== "") {
            let checkDur = entity.duration;
            if (checkDur.startsWith('-')) {
                isNegative = true;
                checkDur = checkDur.substring(1).trim();
            }
            const parts = checkDur.split(':');
            const h = parseInt(parts[0], 10) || 0;
            const m = parseInt(parts[1], 10) || 0;
            const s = parseInt(parts[2], 10) || 0;
            durationMs = (h * 3600000) + (m * 60000) + (s * 1000);
        }

        let startTime, endTime;
        if (isNegative) {
            startTime = new Date(baseTime.getTime() - durationMs);
            endTime = new Date(baseTime.getTime());
        } else {
            startTime = new Date(baseTime.getTime());
            endTime = new Date(baseTime.getTime() + durationMs);
        }

        // Enforce 15-minute Google Calendar minimum
        if ((endTime.getTime() - startTime.getTime()) < 900000) {
            endTime = new Date(startTime.getTime() + 900000);
        }

        // 5. Package and Ship to Google
        const serverPayload = {
            title: entity.thing,
            startIso: startTime.toISOString(),
            endIso: endTime.toISOString(),
            description: serializedPayload
        };

        C9.Repository.createEvent(serverPayload)
            .then((res) => {
                btn.style.pointerEvents = 'auto';
                btn.style.color = "var(--c1)";
                statusField.innerText = "Ledger Entry created successfully";

                // Optional: push the newly minted keys back to the UI fields so the user sees them
                document.getElementById('timelineDetailsId').innerText = entity.id;
                document.getElementById('timelineDetailsTimestamp').innerText = entity.timestamp;
                document.getElementById('calendarEntryDescriptionInput').innerText = serializedPayload;
            })
            .catch((err) => {
                btn.style.pointerEvents = 'auto';
                btn.style.color = "var(--c1)";
                statusField.innerText = `Server Error: ${err.message}`;
            });
    },

      submitUpdatedEvent: function() {
        const btn = document.getElementById('updateCalendarEventBtn');
        const statusField = document.getElementById('calendarEntryStatusField');
        const entity = C9.Store.state.ThingEntityPayload;
        const eventId = C9.Store.state.activeLedgerEntryGoogleCalendarId;

        // 1. Safety Gate Checks
        if (!entity.isValidated) {
            statusField.innerText = "Please parse the entry successfully first.";
            return;
        }

        if (entity.id === "" || entity.timestamp === "") {
            statusField.innerText = "Missing ID or Timestamp. This looks like a new entry";

            return;
        }

        if (!eventId ) {
            statusField.innerText = "Invalid or missing Google Event ID";
            return;
        }

        btn.style.pointerEvents = 'none';
        btn.style.color = "var(--c1d1)";
        statusField.innerText = "Pushing update to Google...";
        statusField.style.color = "var(--c1d1)";

        // 2. Serialize Final [#C9] Payload (No minting, just pure translation)
        let serializedPayload = `[#C9]\n`;
        serializedPayload += `symbol:${entity.symbol}\n`;
        serializedPayload += `thing:${entity.thing}\n`;
        serializedPayload += `idt:${entity.idt}\n`;
        serializedPayload += `duration:${entity.duration}\n`;
        serializedPayload += `id:${entity.id}\n`;
        serializedPayload += `timestamp:${entity.timestamp}\n`;
        serializedPayload += `[#C9D]\n`;
        if (entity.data !== "") serializedPayload += `${entity.data}\n`;
        serializedPayload += `[/#C9D]\n`;
        serializedPayload += `[/#C9]`;

        // 3. Calculate Google Calendar Arbitrary Boundaries
        let baseTime = entity.idt !== "" ? new Date(entity.idt) : new Date(Number(entity.timestamp));
        let durationMs = 0;
        let isNegative = false;

        if (entity.duration !== "") {
            let checkDur = entity.duration;
            if (checkDur.startsWith('-')) {
                isNegative = true;
                checkDur = checkDur.substring(1).trim();
            }
            const parts = checkDur.split(':');
            const h = parseInt(parts[0], 10) || 0;
            const m = parseInt(parts[1], 10) || 0;
            const s = parseInt(parts[2], 10) || 0;
            durationMs = (h * 3600000) + (m * 60000) + (s * 1000);
        }

        let startTime, endTime;
        if (isNegative) {
            startTime = new Date(baseTime.getTime() - durationMs);
            endTime = new Date(baseTime.getTime());
        } else {
            startTime = new Date(baseTime.getTime());
            endTime = new Date(baseTime.getTime() + durationMs);
        }

        // Enforce 15-minute Google Calendar minimum
        if ((endTime.getTime() - startTime.getTime()) < 900000) {
            endTime = new Date(startTime.getTime() + 900000);
        }

        // 4. Package and Ship to Google
        const serverPayload = {
            eventId: eventId,
            title: entity.thing,
            startIso: startTime.toISOString(),
            endIso: endTime.toISOString(),
            description: serializedPayload
        };

        C9.Repository.updateEvent(serverPayload)
            .then((res) => {
                btn.style.pointerEvents = 'auto';
                btn.style.color = "var(--c1)";
                statusField.innerText = "Update successfull";

                // Optional cleanup: reset status field after a few seconds
                setTimeout(() => {
                    if (statusField.innerText === 'Update successfully') {
                        statusField.innerText = '';
                    }
                }, 3000);

                document.getElementById('calendarEntryDescriptionInput').innerText = serializedPayload;
            })
            .catch((err) => {
                btn.style.pointerEvents = 'auto';
                btn.style.color = "var(--c1)";
                statusField.innerText = `Server Error: ${err.message}`;
            });
        }
    };
</script>
