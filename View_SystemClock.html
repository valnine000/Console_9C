<script type="text/javascript">
    // ==========================================
    // SYSTEM CLOCK & DATE (UI RENDERER)
    // ==========================================
    window.C9.SystemClock = {
      lastDayInt: null,
      dateFormatter: new Intl.DateTimeFormat('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
      }),

      render: function(now) {
        const clockElement = document.getElementById('systemClock');
        const dateElement = document.getElementById('systemDate');

        // 1. Check if the physical day of the month has rolled over
        const currentDayInt = now.getDate();
        if (currentDayInt !== this.lastDayInt) {
          const parts = this.dateFormatter.formatToParts(now);
          let currentDateString = "";

          for (const part of parts) {
            currentDateString += part.value;
          }

          if (dateElement) {
            dateElement.innerText = currentDateString;
          }
          this.lastDayInt = currentDayInt;
        }

        // 2. Format and Update Clock
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();

        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;

        minutes = minutes < 10 ? '0' + minutes : minutes;
        seconds = seconds < 10 ? '0' + seconds : seconds;

        if (clockElement) clockElement.innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
      },

      // 3. The Registration Method
      initialize: function() {
        // We must bind 'this' so the TimeEngine doesn't lose the context of the object
        C9.TimeEngine.subscribe(this.render.bind(this));
      }
    };
</script>
