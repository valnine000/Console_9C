<script type="text/javascript">
    // ==========================================
    // MASTER BOOTLOADER
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Hand off all UI binding to the Intent Controller
      C9.Intent.initializeAll();

      // 2. Initialize Data Architecture
      C9.SyncEngine.initializeDataStore();
      C9.QuerySpace.fetchAll();

      // 3. Initialize the Read Path
      C9.Compositor.initialize();

      // 4. Register Time-Based Views
      C9.SystemClock.initialize();
      C9.Timeline.initialize();

      // 5. Ignite the Global Clock
      C9.TimeEngine.start();
    });

</script>
