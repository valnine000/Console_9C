<script type="text/javascript">
  // Memory Management Configuration

    // ==========================================
    // MASTER BOOTLOADER
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Hand off all UI binding to the Intent Controller
      C9.Intent.initializeAll();

      // 2. Initialize Data Architecture
      C9.SyncEngine.initializeDataStore();
      C9.QuerySpace.fetchAll();

      // 3. Initialize the Read Path
      C9.Compositor.initialize();

      // 4. Register Time-Based Views
      C9.SystemClock.initialize();
      C9.Timeline.initialize();

      // 5. Ignite the Global Clock
      C9.TimeEngine.start();
    });

    // ==========================================
    // CALENDAR EVENT CREATOR (Client-Side)
    // ==========================================
    function submitNewCalendarEvent() {
      const btn = document.getElementById('createNewEntry');
      const statusField = document.getElementById('calendarEntryStatusField');

      // 1. Gather all the current span values
      const title = document.getElementById('calendarEntryTitleInput').innerText.trim();
      const startD = document.getElementById('calendarEntryStartDateInput').innerText.trim();
      const startT = document.getElementById('calendarEntryStartTimeInput').innerText.trim();
      const endD = document.getElementById('calendarEntryEndDateInput').innerText.trim();
      const endT = document.getElementById('calendarEntryEndTimeInput').innerText.trim();

      // Use innerText to preserve the pre-wrap formatting
      const desc = document.getElementById('calendarEntryDescriptionInput').innerText;

      // 2. Reassemble and validate the Date objects
      const startDateTime = new Date(`${startD} ${startT}`);
      const endDateTime = new Date(`${endD} ${endT}`);

      if (isNaN(startDateTime.getTime()) || isNaN(endDateTime.getTime())) {
        statusField.innerText = "Error: Invalid date/time format.";
        statusField.style.color = "red";
        return; // Stop execution
      }

      // 3. Lock the UI
      btn.style.pointerEvents = 'none'; // Physically disables clicking on the div
      btn.innerText = "Saving...";
      statusField.innerText = "Creating event...";
      statusField.style.color = "var(--c1d1)"; // Standard text color

      // 4. Package the payload with bulletproof ISO strings
      const payload = {
        title: title,
        startIso: startDateTime.toISOString(),
        endIso: endDateTime.toISOString(),
        description: desc
      };

      // 5. Send to Repository
      C9.Repository.createEvent(payload)
        .then((res) => {
          btn.style.pointerEvents = 'auto';
          btn.innerText = "New";
          statusField.innerText = "Event created successfully!";
          statusField.style.color = "green";
        })
        .catch((err) => {
          btn.style.pointerEvents = 'auto';
          btn.innerText = "New";
          statusField.innerText = `Error: ${err.message}`;
          statusField.style.color = "red";
        });
    }


    // ==========================================
    // CALENDAR EVENT UPDATER (Client-Side - Pure Server Push)
    // ==========================================
    function submitUpdatedCalendarEvent() {
      const btn = document.getElementById('updateCalendarEventBtn');
      const statusField = document.getElementById('calendarEntryStatusField');
      console.log("statusField:", statusField.innerText);

      // 1. Grab the Google Event ID directly from the State Store Quarantine
      const eventId = C9.Store.state.stagedGoogleCalendarId;

      if (!eventId || eventId === "-" ) {
        statusField.innerText = "Error: Invalid or missing Google Event ID.";
        statusField.style.color = "red";
        return; // Stop execution
      }

      // 2. Gather the UI field values
      const title = document.getElementById('calendarEntryTitleInput').innerText.trim();
      const startD = document.getElementById('calendarEntryStartDateInput').innerText.trim();
      const startT = document.getElementById('calendarEntryStartTimeInput').innerText.trim();
      const endD = document.getElementById('calendarEntryEndDateInput').innerText.trim();
      const endT = document.getElementById('calendarEntryEndTimeInput').innerText.trim();
      const desc = document.getElementById('calendarEntryDescriptionInput').innerText;

      // 3. Reassemble and validate Dates
      const startDateTime = new Date(`${startD} ${startT}`);
      const endDateTime = new Date(`${endD} ${endT}`);

      if (isNaN(startDateTime.getTime()) || isNaN(endDateTime.getTime())) {
        statusField.innerText = "Error: Invalid date/time format.";
        statusField.style.color = "red";
        return;
      }

      // 4. Lock the UI
      btn.style.pointerEvents = 'none';
      btn.innerText = "Updating...";
      statusField.innerText = "Pushing update to Google...";
      statusField.style.color = "var(--c1d1)";

      // 5. Package the payload
      const payload = {
        eventId: eventId,
        title: title,
        startIso: startDateTime.toISOString(),
        endIso: endDateTime.toISOString(),
        description: desc
      };

      // 6. Send to Repository
      C9.Repository.updateEvent(payload)
        .then((res) => {
          btn.style.pointerEvents = 'auto';
          btn.innerText = "Update";
          statusField.innerText = "Successfully updated on Google!";
          setTimeout(() => { if (statusField.innerText === 'Successfully updated on Google!') statusField.innerText = '-'; }, 3000);
        })
        .catch((err) => {
          btn.style.pointerEvents = 'auto';
          btn.innerText = "Update";
          statusField.innerText = `Error: ${err.message}`;
          statusField.style.color = "red";
        });
    }
</script>
