<script type="text/javascript">
    // ==========================================
    // CORE PARSING UTILITIES
    // ==========================================
    window.C9.Parser = {
      // 1. The Bulletproof Car Wash
      cleanHtmlText: function(rawHtml) {
        if (!rawHtml) return "";
        let preWashed = rawHtml.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>|<\/div>/gi, '\n');
        const doc = new DOMParser().parseFromString(preWashed, 'text/html');
        return doc.body.textContent || "";
      },

      // 2. The Universal Field Extractor
      extractC9Field: function(cleanText, fieldKey) {
        if (!cleanText) return "";
        const c9BlockMatch = cleanText.match(/\[#C9\]([\s\S]*?)\[\/#C9\]/i);
        if (!c9BlockMatch || !c9BlockMatch[1]) return "";
        const block = c9BlockMatch[1];
        const regex = new RegExp(`^${fieldKey}:[ \\t]*(.*)$`, 'im');
        const match = block.match(regex);
        return match ? match[1].trim() : "";
      },

      // 3. The Tag Extractor
      extractC9Block: function(cleanText, tagPrefix) {
        if (!cleanText || !tagPrefix) return "";
        const regexStr = `\\[#${tagPrefix}\\]([\\s\\S]*?)\\[/#${tagPrefix}\\]`;
        const regex = new RegExp(regexStr, 'i');
        const match = cleanText.match(regex);
        return match && match[1] ? match[1].trim() : "";
      }
    };
</script>
